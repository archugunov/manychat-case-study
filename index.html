<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Product Case Study</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

        <style>
            :root{
                --bg:#000; --card:#111114; --card2:#1B1E25; --text:#fff; --muted:#C4C9DD; --faint:#6E7180;
                --pink:#FF83DA; --pink-soft:#FFC5EE; --line:rgba(255,255,255,.12);
                --font:"Inter", system-ui, -apple-system, sans-serif;
            }
            .staticrypt-html{height:100%;}
            .staticrypt-body{height:100%;margin:0;}
            .staticrypt-content{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--font);
                -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;display:flex;align-items:center;justify-content:center;}
            .staticrypt-page{width:100%;max-width:420px;padding:0 1.5rem;margin:auto;box-sizing:border-box;}
            .staticrypt-form{position:relative;z-index:1;background:var(--card);width:100%;max-width:380px;margin:0 auto;
                padding:40px;text-align:left;border:1px solid var(--line);border-radius:20px;
                box-shadow:0 30px 80px rgba(0,0,0,.6);box-sizing:border-box;}
            .staticrypt-instructions{margin:0 0 1.4rem;}
            .staticrypt-title{font-size:1.5rem;font-weight:700;letter-spacing:-.005em;margin:0 0 .6rem;color:var(--text);line-height:1.15;}
            .staticrypt-instructions p:last-child{margin:0;color:var(--muted);font-size:.95rem;line-height:1.45;}
            .staticrypt-hr{margin:1.2rem 0;border:0;border-top:1px solid var(--line);}
            .staticrypt-password-container{position:relative;background:var(--card2);width:100%;border:1px solid var(--line);
                border-radius:10px;margin:0 0 1rem;box-sizing:border-box;}
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{background:transparent;border:0;box-sizing:border-box;font-size:15px;
                font-family:var(--font);outline:0;padding:14px 44px 14px 16px;width:100%;color:var(--text);}
            .staticrypt-form input::placeholder{color:var(--faint);}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;width:18px;opacity:.7;padding:13px;
                position:absolute;right:0;top:50%;transform:translateY(-50%);filter:invert(0.9);}
            .staticrypt-form .staticrypt-decrypt-button{text-transform:uppercase;letter-spacing:.04em;outline:0;
                background:var(--pink-soft);width:100%;border:0;border-radius:10px;padding:14px;color:#000;font-size:14px;
                font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s,transform .2s;}
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus{background:#fff;transform:translateY(-1px);}
            label.staticrypt-remember{display:flex;align-items:center;margin-bottom:1rem;color:var(--muted);font-size:.9rem;}
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.3);margin-right:.8rem;accent-color:var(--pink);}
            .hidden{display:none !important;}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid rgba(255,255,255,.2);
                border-right-color:var(--pink);border-radius:50%;animation:spinner-border .75s linear infinite;}
            @keyframes spinner-border{100%{transform:rotate(360deg);}}
            @media screen and (-webkit-min-device-pixel-ratio: 0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{font-size:16px;}
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <div class="staticrypt-form">
                    <div class="staticrypt-instructions">
                        <p class="staticrypt-title">Product Case Study</p>
                        <p>This deck is private — enter the password to view.</p>
                    </div>

                    <hr class="staticrypt-hr" />

                        </div>

                            Remember me
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="View the deck" />
                    </form>
                </div>
            </div>
        </div>
